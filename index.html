<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Date Invitation 💖</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #ffd6e8, #ffe8f3); min-height: 100vh; display: flex; justify-content: center; align-items: center; color: #444; }
        .card { width: 90%; max-width: 600px; background: white; padding: 35px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,.1); text-align: center; }
        h1 { color: #ff4f93; margin-bottom: 20px; }
        .step { display: none; }
        .step.active { display: block; }
        .btn { border: none; padding: 12px 24px; margin: 10px; border-radius: 50px; cursor: pointer; font-size: 16px; }
        .yes { background: #ff4f93; color: white; }
        .no { background: #f3d0df; color: #444; position: relative; }
        input { width: 100%; padding: 12px; margin-top: 15px; border-radius: 10px; border: 1px solid #ddd; }
        .activities { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .activity { background: #ffe1ef; padding: 15px; border-radius: 15px; cursor: pointer; transition: .3s; }
        .activity.selected { background: #ff4f93; color: white; }
        .summary { text-align: left; margin-top: 20px; background: #fff0f7; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

<div class="card">
    <!-- STEP 1 -->
    <div class="step active" id="step1">
        <h1>💖 Will You Go On A Second Date?</h1>
        <button class="btn yes" onclick="nextStep(2)">Yes ❤️</button>
        <button class="btn no" id="noBtn">No 🙈</button>
    </div>

    <!-- STEP 2 -->
    <div class="step" id="step2">
        <h1>📅 Pick Date & Time</h1>
        <input type="date" id="date">
        <input type="time" id="time">
        <br><br>
        <button class="btn yes" onclick="nextStep(3)">Next →</button>
    </div>

    <!-- STEP 3 -->
    <div class="step" id="step3">
        <h1>✨ Choose An Activity</h1>
        <div class="activities">
            <div class="activity">🍽 Dinner</div>
            <div class="activity">🎬 Movie</div>
            <div class="activity">☕ Coffee</div>
            <div class="activity">🌇 Sunset Walk</div>
        </div>
        <br>
        <button class="btn yes" onclick="prepareConfirmation()">Confirm Selection</button>
    </div>

    <!-- STEP 4 -->
    <div class="step" id="step4">
        <h1>🎉 Almost Done!</h1>
        <div class="summary" id="summary"></div>
        <!-- FORMSPREE INTEGRATION -->
        <form action="https://formspree.io/f/mzdlbdvy" method="POST">
            <input type="hidden" name="Date" id="final-date">
            <input type="hidden" name="Time" id="final-time">
            <input type="hidden" name="Activity" id="final-activity">
            <button type="submit" class="btn yes" style="width: 100%; margin-top: 20px;">Send Date Plan to Me! 💌</button>
        </form>
    </div>
</div>

<script>
    function nextStep(step) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');
    }

    const noBtn = document.getElementById('noBtn');
    noBtn.addEventListener('mouseover', () => {
        noBtn.style.transform = `translate(${Math.random()*200-100}px, ${Math.random()*100-50}px)`;
    });

    let selectedActivity = '';
    document.querySelectorAll('.activity').forEach(item => {
        item.addEventListener('click', () => {
            document.querySelectorAll('.activity').forEach(a => a.classList.remove('selected'));
            item.classList.add('selected');
            selectedActivity = item.innerText;
        });
    });

    function prepareConfirmation() {
        const date = document.getElementById('date').value;
        const time = document.getElementById('time').value;
        document.getElementById('summary').innerHTML = `<strong>Date:</strong> ${date}<br><strong>Time:</strong> ${time}<br><strong>Activity:</strong> ${selectedActivity}`;
        
        // Fill Formspree hidden fields
        document.getElementById('final-date').value = date;
        document.getElementById('final-time').value = time;
        document.getElementById('final-activity').value = selectedActivity;
        
        nextStep(4);
    }
</script>
</body>
</html>
