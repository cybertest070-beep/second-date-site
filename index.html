<!-- Step 4: Confirmation -->
<div id="step-4" class="step">
    <h2>It's a Date! 🎉</h2>
    <div class="summary-box">
        <!-- The form wraps your confirmation details -->
        <form id="invite-form" action="https://formspree.io/f/mzdlbdvy" method="POST">
            <p><strong>🕒 When:</strong> <span id="display-time"></span></p>
            <!-- These hidden inputs hold the data that gets emailed to you -->
            <input type="hidden" name="Date-Time" id="input-time">
            
            <p><strong>🎯 What:</strong> <span id="display-activity"></span></p>
            <input type="hidden" name="Activity" id="input-activity">
            
            <!-- This button submits the form to your email -->
            <button type="submit" id="btn-submit">Confirm and Send to Me!</button>
        </form>
    </div>
</div>
